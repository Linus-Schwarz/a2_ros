build:
  parallel-workers: 6
  symlink-install: true
  merge-install: true
  cmake-args:
    - -DCMAKE_BUILD_TYPE=Release
  build-base: /a2_ros_ws/build
  install-base: /a2_ros_ws/install
  base-paths:
    - "/a2_ros"
  packages-ignore:
    - unitree_mujoco
    - a2_sim
    - a2_sim_utils
    - unitree_ros2_example
    - a2_locomotion_controller
    - a2_pc2
    - a2_sim
    - a2_sim_full
