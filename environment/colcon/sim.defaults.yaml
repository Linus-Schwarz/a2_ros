build:
  parallel-workers: 6
  symlink-install: true
  merge-install: true
  cmake-args:
    - -DCMAKE_BUILD_TYPE=Release
  build-base: /a2_ros_ws/build
  install-base: /a2_ros_ws/install
  base-paths:
    - "/a2_ros"
  packages-ignore:
    - hesai_ros_driver
    - unitree_ros2_example
    - gscam2
    - a2_pc2
    - a2_robot
